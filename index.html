<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6b4e23 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 600;
      font-size: 14px;
    }
    
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .shift-group {
      display: none;
    }
    
    .shift-group.show {
      display: block;
    }
    
    input[type="number"] {
      width: 100%;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    #encryptBtn {
      background: #af7738;
      color: white;
    }
    
    #encryptBtn:hover {
      background: #af7738;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    
    #decryptBtn {
      background: #af7738;
      color: white;
    }
    
    #decryptBtn:hover {
      background: #af7738;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .result-group {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
      border-left: 4px solid #7609a1;
      min-height: 60px;
      display: none;
    }
    
    .result-group.active {
      display: block;
    }
    
    .result-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 5px;
      font-weight: 600;
    }
    
    #result {
      font-size: 16px;
      color: #333;
      word-break: break-all;
      font-weight: 500;
    }
    
  </style>
</head>
<body>
  <div class="container">
    <h1> Cipher Tool</h1>
    
    <div class="form-group">
      <label for="cipherType">Select Cipher Type:</label>
      <select id="cipherType" onchange="toggleShiftInput()">
        <option value="atbash">Atbash Cipher</option>
        <option value="caesar">Caesar Cipher</option>
        <option value="rot13">ROT13 Cipher</option>
      </select>
    </div>
    
    <div class="form-group shift-group" id="shiftGroup">
      <label for="shiftValue">Shift Value (1-25):</label>
      <input 
        type="number" 
        id="shiftValue" 
        min="1" 
        max="25" 
        value="3"
        placeholder="Enter shift value (1-25)"
      />
    </div>
    
    <div class="form-group">
      <label for="inputText">Enter Text:</label>
      <input 
        type="text" 
        id="inputText" 
        placeholder="Type your text here..." 
      />
    </div>
    
    <div class="button-group">
      <button id="encryptBtn" onclick="encrypt()">Encrypt</button>
      <button id="decryptBtn" onclick="decrypt()">Decrypt</button>
    </div>
    
    <div class="result-group" id="resultGroup">
      <div class="result-label" id="resultLabel"></div>
      <div id="result"></div>
    </div>
    
    <div class="info" id="info"></div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
